	<body>
		<span id="nav">
			<a href="javascript:loadForm('wand')" class="mainButtons combut">Wands</a>
			<!-- <a href="javascript:loadForm('potion')" class="mainButtons combut">Potions</a> -->

		<div id="commandForm"></div>

		<div id="commandOutput" class="ui-widget-content ui-draggable ui-draggable-handle" onmouseover="this.style.cursor='pointer'" style="display: inline-block;">
			<span id="outputLength" title="">Command Output</span><br>
			<textarea id="commandOutput-text"></textarea>
			<a href="javascript:generateCommand()" class="greenPlus">Generate</a>
			<span id="toClipBoard" class="greenPlus" onclick="copyCommand()">Copy</span>
		</div>

		<script>
			let outputCommandType = 'None';

			function generateCommand() {
				switch (outputCommandType) {
					case 'None':
						break;
					case 'wand':
						document.getElementById("commandOutput-text").value = generateWand();
						break;
					default:
						break;
				}
			}

			function generateWand() {
				name = document.getElementById("name").value

				elem = document.getElementById('GiveItem0ItemNamecolor')
				if (elem.value == "Hex Code") {
					hex = elem.nextSibling
					color = ",\"color\":\"" + hex.value + "\""
				} else {
					color = ",\"color\":\"" + elem.value + "\""
				}

				boldC = document.querySelector('input[name="GiveItem0ItemNamebold"]:checked').value
				bold = (boldC === "unset") ? "" : (boldC === "true") ? ",\"bold\":true" : ",\"bold\":false"

				italicC = document.querySelector('input[name="GiveItem0ItemNameitalic"]:checked').value
				italic = (italicC === "unset") ? ",\"italic\":false" : (italicC === "true") ? ",\"italic\":true" : ",\"italic\":false"

				underlinedC = document.querySelector('input[name="GiveItem0ItemNameunderlined"]:checked').value
				underlined = (underlinedC === "unset") ? "" : (underlinedC === "true") ? ",\"underlined\":true" : ",\"underlined\":false"

				strikethroughC = document.querySelector('input[name="GiveItem0ItemNamestrikethrough"]:checked').value
				strikethrough = (strikethroughC === "unset") ? "" : (strikethroughC === "true") ? ",\"strikethrough\":true" : ",\"strikethrough\":false"

				obfuscatedC = document.querySelector('input[name="GiveItem0ItemNameobfuscated"]:checked').value
				obfuscated = (obfuscatedC === "unset") ? "" : (obfuscatedC === "true") ? ",\"obfuscated\":true" : ",\"obfuscated\":false"

				var woods={acacia:"Acacia",alder:"Alder",apple:"Apple",ash:"Ash",aspen:"Aspen",beech:"Beech",birch:"Birch",blackthorn:"Blackthorn",black_walnut:"Black Walnut",cedar:"Cedar",cherry:"Cherry",chestnut:"Chestnut",cypress:"Cypress",dogwood:"Dogwood",ebony:"Ebony",elder:"Elder",elm:"Elm",english_oak:"English oak",fir:"Fir",hawthorn:"Hawthorn",hazel:"Hazel",holly:"Holly",hornbeam:"Hornbeam",ivy:"Ivy",larch:"Larch",laurel:"Laurel",mahogany:"Mahogany",maple:"Maple",pear:"Pear",pine:"Pine",poplar:"Poplar",prickly_ash:"Prickly ash",red_oak:"Red oak",redwood:"Redwood",reed:"Reed",rosewood:"Rosewood",rowan:"Rowan",silver_lime:"Silver lime",spruce:"Spruce",sugar_maple:"Sugar Maple",swamp_mayhaw:"Swamp mayhaw",sycamore:"Sycamore",tamarack:"Tamarack",vine:"Vine",walnut:"Walnut",willow:"Willow",yew:"Yew",custom:"Custom"};
				var cores={african_mermaid_hair:"African mermaid hair",basilisk_horn:"Basilisk horn",bone:"Bone",curupira_hair:"Curupira hair",dittany:"Dittany",dragon_heartstring:"Dragon heartstring",horned_serpent_horn:"Horned Serpent horn",jackalope_antler:"Jackalope antler",kelpie_hair:"Kelpie hair",koralle:"Koralle",phoenix_feather:"Phoenix feather",rougarou_hair:"Rougarou hair",shell:"Shell",snallygaster_heartstring:"Snallygaster heartstring",supreme_cores:"Supreme Cores",thestral_tail_hair:"Thestral tail hair",thunderbird_tail_feather:"Thunderbird tail feather",troll_whisker:"Troll whisker",twin_wand_cores:"Twin Wand Cores",unicorn_hair:"Unicorn hair",veela_hair:"Veela hair",wampus_cat_hair:"Wampus cat hair",white_river_monster_spine:"White River Monster spine",custom:"Custom"};

				target = document.getElementById('targetSelector').value
				wood = document.getElementById('woods').value
				core = document.getElementById('cores').value

				let woodIndex = 0
				for (const [key, value] of Object.entries(woods)) {
					woodIndex++;
					if (key == wood)
						break;
				}

				let coreIndex = 0
				for (const [key, value] of Object.entries(cores)) {
					coreIndex++;
					if (key == core)
						break;
				}

				customModelData = woodIndex + ('00' + coreIndex).slice(-2)

				outputString = "/give " + target + " stick{display:{Name:'{\"text\":\"" + name + "\"" + color + italic + bold + underlined + strikethrough + obfuscated + "}'},CustomModelData:" + customModelData + ",Wood:" + woodIndex + ",WoodName:'{\"text\":\"" + woods[wood] + "\"}',Core:" + coreIndex + ",CoreName:'{\"text\":\"" + cores[core] + "\"}',Wand:1b,Set:0b} 1"
				console.log(woodIndex)
				return outputString
			}

			function copyCommand() {
				var copyText = document.getElementById("commandOutput-text");
				copyText.select();
  				copyText.setSelectionRange(0, 99999);
  				navigator.clipboard.writeText(copyText.value);

			}
			function validateInt(id) {
				num = id.value
				if (!(Number(num) || num === "")){
					alert("Invalid! This input has to be an integer.");
				}
			}
			function validateColor() {
				elem = document.getElementById('GiveItem0ItemNamecolor')
				if (elem.value == "Hex Code") {
					hex = elem.nextSibling
					if (hex.style.display == "none"){
						hex.style.display = "flex"
					} else {
						hex.style.display = "none"
					}
				} else {
					hex = elem.nextSibling
					hex.style.display = "none"
				}
			}
			function showHide(e, t) {
				console.log($("#" + e).is(":visible"))
				$("#" + e).is(":visible") ? ($("#" + e + ", #" + t).addClass("hiding").removeClass("shown"), $("#" + e).hide(), $("#" + t).html("<span>Show</span>")) : ($("#" + e + ", #" + t).addClass("shown").removeClass("hiding"), $("#" + e).show(), $("#" + t).html("<span>Hide</span>"))
			}
			function mkShowHide(e, t) {
				return " <a id='" + t + "' href=\"javascript:showHide('" + e + "','" + t + "')\" class='showHide'><span>Hide</span></a>"
			}

			function getSelectors(pane, o, n) {
				var s = o ? o : "";
				var n = n ? n : "selector"
				let p = ""
				$("#" + pane).append(
					"<br><span class='pane'>Target Selectors </span>" + 
					mkShowHide(s + "SelectorPane", "SelectorPaneSH") + 
					"<div id='" + 
					s + 
					"SelectorPane' class='selectorControl roundedDiv'></div>"
				);
				var values = {
					"@p": "nearest player",
					"@r": "random player",
					"@a": "all players",
					"@s": "the entity executing the command",
					"MC_Name": "A specific players name"
				}
				for (const [key, value] of Object.entries(values)) {
					p += "<option value='" + key + "'>" + value + "</option>"
				}
				$("#SelectorPane").append("<span>Target </span><input type='text' value='" + Object.keys(values)[0] + "' id='" + n + "_txt'>")
				$("#SelectorPane").append("<select id='targetSelector' onchange='updateText(" + "targetSelector" + ", " + JSON.stringify(values) + ")'>" + p + "</select>")
				$("#SelectorPane").append("<br><span>Limit </span><input type='text' value='' id='limit' onchange='validateInt(limit)'></br>")
			}

				n = n.toLowerCase().replace(/ /g, '')
				var woods = {

				}
				for (const [key, value] of Object.entries(woods)) {
					w += "<option value='" + key + "'>" + value + "</option>"

				var cores = {

				for (const [key, value] of Object.entries(cores)) {

='true' class='tellrawUpdate' title='true'></td><td><input type='radio' id='GiveItem0ItemNamestrikethroughfalse' name='GiveItem0ItemNamestrikethrough' value='false' class='tellrawUpdate' title='false'></td></tr><tr><td align='right'>Obfuscated</td><td><input type='radio' id='GiveItem0ItemNameobfuscatedunset' name='GiveItem0ItemNameobfuscated' value='unset' class='tellrawUpdate' title='unset' checked></td><td><input type='radio' id='GiveItem0ItemNameobfuscatedtrue' name='GiveItem0ItemNameobfuscated' value='true' class='tellrawUpdate' title='true'></td><td><input type='radio' id='GiveItem0ItemNameobfuscatedfalse' name='GiveItem0ItemNameobfuscated' value='false' class='tellrawUpdate' title='false'></td></tr></tbody></table></span></br>")

				$("#ItemPane").append("<br><span>Core </span><input type='text' value='" + Object.keys(cores)[0] + "' id='" + "cores" + "_txt'>")

			/*function createComponent(e, n) {
				$("#" + e).append(mkShowHide(n + "Pane", n + "SH") + "<div id='" + n + "Pane' class='itemSelectControl roundedDiv'></div>")

			function updateText(elem, values) {
				let preElem = elem.previousSibling;
				//console.log(elem.value)
				preElem.value = elem.value;
			}

			function removeAllChildNodes(parent) {
				while (parent.firstChild) {
					parent.removeChild(parent.firstChild);
				}
			}

			function loadForm(e) {
				removeAllChildNodes(document.querySelector("#commandForm"))
				switch (e) {
					case "wand":
						makeWandPane("commandForm", "wandPane")
						outputCommandType = 'wand';
						break;
					case "potion":
						makePotionPane("commandForm", "potionPane")
						outputCommandType = 'potion';
						break;
					default:
						break;
				}
			}

			function makeWandPane(e, t) {
				$("#" + e).append("<br><div id='" + t + "' class='roundedDiv'></div>")
				getSelectors(t)
				createItemComponent(t, "Wand Item")

	<style type="text/css">
		:root {
			--main-text-color:#b846ff;
			--bg-color:#0a0a0a;

			--blue-text:#ff00bc;
			--green-text:#b900e2;

			--visited-link:#eeba0e;

			--main-button-text-color:#8900b9;
			--main-button-frame-color:#888;
			--main-button-text-hover-color:#d45cff;
			--main-frame-color:#888;

			--big-button-color-a: #151515;
			--big-button-color-b: #101010;

			--main-color-c: #151515;
			--main-color-d: #202020;

		}

		}

			color:var(--visited-link);

		}

			background-color:var(--big-button-color-a);
			border:solid var(--main-button-frame-color) 2px; 
		}

			color:var(--main-button-text-hover-color);

		}

		}
		.showHide{
			color:var(--blue-text); 
			background-color:var(--small-button-bg-color);
			border:solid var(--main-button-frame-color) 1px;
			font-weight:bold;
			font-size:10pt;
			font-family:"Arial",sans-serif;
		}
		input, textarea, select {
			background-color:var(--field-bg-color);

		}
