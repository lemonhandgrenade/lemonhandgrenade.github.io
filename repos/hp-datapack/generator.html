			function getPotionColor(color) {
				output = ""
				colors = {
					"black": "#000000",
					"dark_blue": "#0000AA",
					"dark_green": "#00AA00",
					"dark_aqua": "#00AAAA",
					"dark_red": "#AA0000",
					"dark_purple": "#AA00AA",
					"gold": "#FFAA00",
					"gray": "#AAAAAA",
					"dark_gray": "#555555",
					"blue": "#5555FF",
					"green": "#55FF55",
					"aqua": "#55FFFF",
					"red": "#FF5555",
					"light_purple": "#FF55FF",
					"yellow": "#FFFF55",
					"white": "#3F3F3F",
					"reset": "#3F3F3F",
					"none": "#3F3F3F"
				}
				if (colors[color]) {
					tryColor = colors[color]
				} else {
					tryColor = color
				}
				tryColor = tryColor.substring(1)
				hexR = parseInt(tryColor.substring(0,2), 16)
				hexG = parseInt(tryColor.substring(2,4), 16)
				hexB = parseInt(tryColor.substring(4,6), 16)
				endColor = (hexR << 16) + (hexG << 8) + hexB
				
				return endColor
			}

					default:
						break;
				}
			}

			function makeWandPane(e, t) {
				$("#" + e).append("<br><div id='" + t + "' class='roundedDiv'></div>")
				getSelectors(t)
				createItemComponent(t, "Wand Item")
			}

			function makePotionPane(e, t) {
				$("#" + e).append("<br><div id='" + t + "' class='roundedDiv'></div>")
				createItemComponent(t, "Potion Item")
				hidePotionIng(0)
			}
